services:
  # ─── Backend API (FastAPI on Render Web Service) ──────────────
  - type: web
    name: hr-nexus-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/system/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hr-nexus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: '["https://hr-nexus.vercel.app","http://localhost:5173"]'
      - key: ADMIN_EMAIL
        value: admin@hrnexus.com
      - key: ADMIN_PASSWORD
        generateValue: true

# ─── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: hr-nexus-db
    databaseName: hr_nexus
    region: singapore
    plan: free
